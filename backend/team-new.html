<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Team</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
  />
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
  />
  <link rel="stylesheet" href="/static/dashboard-theme.css" />
</head>
<body class="theme-page antialiased relative min-h-screen overflow-x-hidden">
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] blob opacity-80 z-0" style="background: var(--color-blob-indigo);"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] blob opacity-80 z-0" style="background: var(--color-blob-teal);"></div>
  <div class="fixed top-[40%] left-[60%] w-[400px] h-[400px] blob opacity-80 z-0" style="background: var(--color-blob-purple);"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
    <section class="glass-panel w-full max-w-xl rounded-2xl p-6 sm:p-8">
      <div class="mb-6">
        <p class="text-sm" style="color: var(--color-text-muted);">Seam Server</p>
        <h1 class="text-3xl font-bold flex items-center gap-2" style="color: var(--color-text-strong);">
          <i class="ph-fill ph-users-three"></i>
          Create Team
        </h1>
        <p class="mt-2 text-sm" style="color: var(--color-text-muted);">
          Create a team, leader account, and member accounts with tokens in one step.
        </p>
      </div>

      <form method="post" action="/teams/new" class="grid gap-4">
        <label class="text-sm" style="color: var(--color-text-soft);">
          Team name
          <input
            name="team_name"
            required
            maxlength="120"
            class="auth-input mt-2 w-full rounded-lg px-3 py-2"
            placeholder="my-awesome-team"
            autocomplete="off"
          />
        </label>

        <label class="text-sm" style="color: var(--color-text-soft);">
          Leader username
          <input
            name="leader_username"
            required
            maxlength="120"
            class="auth-input mt-2 w-full rounded-lg px-3 py-2"
            placeholder="team_leader"
            autocomplete="username"
          />
        </label>

        <label class="text-sm" style="color: var(--color-text-soft);">
          Member usernames
          <small class="block" style="color: var(--color-text-muted);">
            (comma or newline separated)
          </small>
          <textarea
            name="member_usernames"
            rows="7"
            class="auth-input mt-2 w-full rounded-lg px-3 py-2 resize-none"
            placeholder="alex&#10;priya&#10;noah"
            autocomplete="off"
          ></textarea>
        </label>

        <button
          type="submit"
          class="mt-2 bg-black/5 hover:bg-black/10 transition-colors border border-black/5 text-slate-700 rounded-lg px-4 py-3 font-medium flex items-center justify-center gap-2"
          style="color: var(--color-text-strong);"
        >
          <i class="ph-fill ph-plus-circle"></i>
          Create Team + Users
        </button>
      </form>

      <p class="mt-6 text-sm">
        <a href="/" class="hover:underline flex items-center gap-1" style="color: var(--color-accent);">
          <i class="ph ph-arrow-left"></i>
          Back home
        </a>
      </p>
    </section>
  </main>
</body>
</html>
