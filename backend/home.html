<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seam Server</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
  />
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
  />
  <link rel="stylesheet" href="/static/dashboard-theme.css" />
</head>
<body class="theme-page antialiased relative min-h-screen overflow-x-hidden">
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] blob opacity-80 z-0" style="background: var(--color-blob-indigo);"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] blob opacity-80 z-0" style="background: var(--color-blob-teal);"></div>
  <div class="fixed top-[40%] left-[60%] w-[400px] h-[400px] blob opacity-80 z-0" style="background: var(--color-blob-purple);"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
    <section class="glass-panel w-full max-w-lg rounded-2xl p-6 sm:p-8">
      <div class="mb-6">
        <h1 class="text-4xl font-bold flex items-center gap-3 mb-2" style="color: var(--color-text-strong);">
          <i class="ph-fill ph-code"></i>
          Seam Server
        </h1>
        <p class="text-sm" style="color: var(--color-text-muted);">
          v0.1.0 - team setup, tokens, ping tracking, and dashboard
        </p>
      </div>

      <div class="grid gap-3">
        <a 
          href="/teams/new" 
          class="flex items-center gap-3 p-4 rounded-xl glass-panel-inner hover:bg-black/5 transition-colors shadow-sm"
          style="color: var(--color-text-strong);"
        >
          <i class="ph-fill ph-users-three text-2xl" style="color: var(--color-text-strong);"></i>
          <div>
            <div class="font-semibold text-[15px]">Create Team</div>
            <div class="text-xs font-medium" style="color: var(--color-text-muted);">Set up a new team with members</div>
          </div>
        </a>

        <a 
          href="/dashboard/login" 
          class="flex items-center gap-3 p-4 rounded-xl glass-panel-inner hover:bg-black/5 transition-colors shadow-sm"
          style="color: var(--color-text-strong);"
        >
          <i class="ph-fill ph-shield-check text-2xl" style="color: var(--color-text-strong);"></i>
          <div>
            <div class="font-semibold text-[15px]">Team Leader Login</div>
            <div class="text-xs font-medium" style="color: var(--color-text-muted);">Access your team dashboard</div>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
