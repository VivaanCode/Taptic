<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>__ERROR_TITLE__</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
  />
  <link
    rel="stylesheet"
    type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
  />
  <link rel="stylesheet" href="/static/dashboard-theme.css" />
</head>
<body class="theme-page antialiased relative min-h-screen overflow-x-hidden">
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] blob opacity-80 z-0" style="background: var(--color-blob-indigo);"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] blob opacity-80 z-0" style="background: var(--color-blob-teal);"></div>
  <div class="fixed top-[40%] left-[60%] w-[400px] h-[400px] blob opacity-80 z-0" style="background: var(--color-blob-purple);"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center px-4 py-10">
    <section class="glass-panel w-full max-w-lg rounded-2xl p-6 sm:p-8">
      <div class="mb-6">
        <h1 class="text-3xl font-bold flex items-center gap-2 mb-3" style="color: var(--color-text-strong);">
          <i class="ph-fill ph-warning-circle" style="color: var(--color-danger-text);"></i>
          __ERROR_TITLE__
        </h1>
        <div class="alert-danger rounded-lg px-4 py-3 text-sm">
          <p>__ERROR_MESSAGE__</p>
        </div>
      </div>

      <p class="text-sm">
        <a href="/" class="hover:underline flex items-center gap-1" style="color: var(--color-accent);">
          <i class="ph ph-arrow-left"></i>
          Back to home
        </a>
      </p>
    </section>
  </main>
</body>
</html>
